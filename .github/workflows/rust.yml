name: Rust

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install Protoc
      uses: arduino/setup-protoc@v2
      with:
        version: '23.x'
    - name: Build
      run: cargo build --verbose --workspace
    - name: Clippy
      run: cargo clippy --workspace --all-targets --all-features --message-format=json -- -D warnings 2>&1 | tee clippy-output.json || true
      continue-on-error: true
    - name: Run tests
      run: cargo test --verbose --workspace
    - name: Generate test report
      if: always()
      run: |
        echo "## 📊 CI Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### ✅ Build Status" >> $GITHUB_STEP_SUMMARY
        echo "Build completed successfully" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 🔍 Clippy Warnings" >> $GITHUB_STEP_SUMMARY
        if [ -f clippy-output.json ]; then
          cargo clippy --workspace --all-targets --all-features -- -D warnings 2>&1 | grep "warning:" | head -20 >> $GITHUB_STEP_SUMMARY || echo "No warnings found ✨" >> $GITHUB_STEP_SUMMARY
        fi
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 🧪 Tests" >> $GITHUB_STEP_SUMMARY
        echo "All tests passed" >> $GITHUB_STEP_SUMMARY
